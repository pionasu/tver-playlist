<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TVerプレイリスト編集</title>

    <style>

        body {
            font-family: sans-serif;
            margin: 10px;
            background: #f7f7f7;
        }

        input,
        textarea {
            font-size: 16px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .topBar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }

        .video {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            cursor: grab;
        }

        .thumb {
            width: 120px;
            height: 70px;
            background: #ddd;
            border-radius: 6px;
            object-fit: cover;
        }

        .thumbWrap {
            position: relative;
            width: 120px;
            height: 70px;
            flex-shrink: 0;
        }

        .playIcon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 38px;
            height: 38px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 18px;

            color: white;

            background: rgba(0, 0, 0, 0.5);

            border-radius: 50%;

            pointer-events: none;
        }

        .info {
            flex: 1;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: black;
            color: white;
            cursor: pointer;
            margin: 3px;
        }

        input {
            padding: 6px;
            margin: 5px 5px 5px 0;
        }

        textarea {
            width: 100%;
            height: 60px;
            margin-top: 10px;
        }

        #editArea {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .dateArea {
            display: flex;
            flex-direction: column;
        }

        .dateArea label {
            font-size: 12px;
            margin-bottom: 2px;
            color: #666;
        }

        .autoSaveArea {
            margin: 10px 0;

            display: flex;
            align-items: center;
            gap: 25px;
        }

        #playlistSelect {
            font-size: 20px;
            font-weight: bold;
            border: none;
            background: transparent;
            padding-right: 20px;
            margin-bottom: 10px;
            max-width: 70vw;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .homeButton {
            background: transparent;
            color: black;
            box-shadow: none;
            font-size: 28px;
            padding: 0;
        }

        .addButton {
            align-self: flex-end;
            margin-bottom: 9px;
        }

        .VideoButtons {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }

        .endDateText {
            font-size: 12px;
            color: #777;
            margin-top: 4px;
        }

        .deleteBtn {
            background: #ff4d4d;
            color: white;
        }

        .fileBtn {
            display: inline-block;
            padding: 6px 10px;
            background: #3366FF;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .fileBtn input {
            display: none;
        }

        #fileNameText {
            font-size: 12px;
            color: #666;
        }

        .memberTag.active{
            color:white;
        }

        .memberTag[data-tag="那須"].active{
            background:#4DA3FF;
        }

        .memberTag[data-tag="浮所"].active{
            background:#FF9F43;
        }

        .memberTag[data-tag="作間"].active{
            background:#A66CFF;
        }

        .memberTag[data-tag="深田"].active{
            background:#4CAF50;
        }

        .memberTag[data-tag="龍我"].active{
            background:#FFD600;
            color:black;
        }

        .taglist{
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 6px;
        }

        .videoTag{
            display: inline-block;
            width: fit-content;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            color: white;
            font-weight: bold;
        }

        .videoTag.nasu{
            background: #4DA3FF;
        }

        .videoTag.ukisho{
            background: #FF9F43;
        }

        .videoTag.sakuma{
            background: #A66CFF;
        }

        .videoTag.fukada{
            background: #4CAF50;
        }

        .videoTag.ryuga{
            background: #FFD600;
            color: black;
        }

    </style>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>   

<div class="titleBar">
    <button 
        type="button"
        class="homeButton"
        onclick="goHome()"
    >
        🏠
    </button>
    <select id="playlistSelect" onchange="changePlaylist()">
    </select>
</div>

<div class="topBar">

    <button onclick="createPlaylist()">＋新規プレイリスト</button>

    <button onclick="renamePlaylist()">プレイリスト名変更</button>

    <button onclick="deletePlaylist(currentPlaylist)">プレイリスト削除</button>

</div>



<div class="autoSaveArea">

    <label>
        <input
            type="checkbox"
            id="autoDelete"
            checked
            onchange="saveAutoDeleteSetting()"
        >
        配信終了後自動削除
    </label>

</div>

<div id="editArea">

    <input id="title" placeholder="タイトル">

    <input id="url" placeholder="リンクを挿入">

    <input id="thumb" placeholder="サムネURL">

    <label class="fileBtn">
        ファイル選択
        <input 
            id="fileThumb" 
            type="file" 
            accept="image/*"
            onchange="showFileName()"
        >
    </label>

    <span id="fileNameText"></span>

    <div class="dateArea">

        <label for="endDate">
            配信終了日
        </label>

        <input
            id="endDate"
            type="datetime-local"
        >

    </div>

    <button 
        class="addButton"
        onclick="addVideo()"
    >
        追加
    </button>

    <button
        class="addButton"
        onclick="copyShareUrl()"
    >
        共有
    </button>

    <div class="memberTags">

    <button type="button" class="memberTag" data-tag="浮所">
    浮所
    </button>

    <button type="button" class="memberTag" data-tag="那須">
    那須
    </button>

    <button type="button" class="memberTag" data-tag="作間">
    作間
    </button>

    <button type="button" class="memberTag" data-tag="深田">
    深田
    </button>

    <button type="button" class="memberTag" data-tag="龍我">
    龍我
    </button>

    </div>

</div>

<hr>

<div id="list"></div>

<script>

let currentPlaylist = "";

let dragIndex = 0;

let editingIndex = null;

let selectedTags = [];

document.querySelectorAll(".memberTag").forEach(btn => {
    btn.onclick = () => {
        const tag = btn.dataset.tag;
        if(selectedTags.includes(tag)){
            selectedTags =
                selectedTags.filter(t => t !== tag);
            btn.classList.remove("active");
        }else{
            selectedTags.push(tag);
            btn.classList.add("active");
        }
    };
});

function setCurrentPlaylist(name) {
    if (!name) {
        currentPlaylist = "";
    } else {
        currentPlaylist = name;
    }
    localStorage.setItem("lastPlaylist", currentPlaylist);
}

function getPlaylistFromURL() {

    const params =
        new URLSearchParams(location.search);

    const isNew = params.get("new") === "1";
    const urlPlaylist = params.get("id");
    const lastPlaylist = localStorage.getItem("lastPlaylist");

    if (isNew) {
        history.replaceState(null, "", "create.html");
    }

    if (isNew) {
        currentPlaylist = "";
    } else if (urlPlaylist) {
        currentPlaylist = urlPlaylist;
    } else if (lastPlaylist) {
        currentPlaylist = lastPlaylist;
    } else {
        currentPlaylist = "";
    }

    const isFromURL = !!urlPlaylist;

    if (!isNew && !isFromURL) {
        localStorage.setItem("lastPlaylist", currentPlaylist);
    }

    localStorage.setItem("lastPlaylist", currentPlaylist);

    return currentPlaylist;
}

window.onload = async function () {

    const urlPlaylist = getPlaylistFromURL();

    if (!currentPlaylist) {
        currentPlaylist = "";
    }

    localStorage.setItem("lastPlaylist", currentPlaylist)

    await updatePlaylistSelect();
    await removeExpiredVideos();
    await render();
    loadAutoDeleteSetting();
};

function formatDateTime(date) {

    if (!date) return "";

    const d = new Date(date);

    return d.toLocaleString(
        "ja-JP",
        {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        }
    );
}

function getRemainingTime(date) {

    if (!date) return "";

    const now = new Date();

    const end = new Date(date);

    const diff = end - now;

    if (diff <= 0) {
        return "配信終了";
    }

    const minutes =
        Math.floor(
            diff / (1000 * 60)
        );

    const hours =
        Math.floor(
            diff / (1000 * 60 * 60)
        );

    const days =
        Math.floor(hours / 24);

    if (days > 0) {
        return `${days}日`;
    }

    if (hours >= 1) {
        return `${hours}時間`;
    }

    return `${minutes}分`;
}

async function addVideo () {

    const title = document.getElementById("title").value;
    const url = document.getElementById("url").value;
    const endDate = document.getElementById("endDate").value;

    const fileInput = document.getElementById("fileThumb");
    let thumb = document.getElementById("thumb").value;
    const autoDelete = document.getElementById("autoDelete").checked;

    if (!title || !url) return;

    if (fileInput.files && fileInput.files[0]) {
        thumb = await fileToBase64(fileInput.files[0]);
    }

    if (editingIndex !== null) {

        await updateDoc (
            doc(window.db, "videos", editingIndex),
            {
                title,
                url,
                thumb,
                endDate,
                autoDelete,
                tags: [...selectedTags]
            }
        );

        editingIndex = null;

        document.querySelector(".addButton").textContent = "追加";
    } else {
        const q = query(
            collection(window.db, "videos"),
            where("playlist", "==", currentPlaylist),
            orderBy("order")
        );
        
        const snap = await getDocs(q);

        const order = snap.size;

        await addDoc(
            collection(window.db, "videos"),
            {
                playlist: currentPlaylist,
                title,
                url,
                thumb,
                endDate,
                autoDelete,
                order,
                tags: [...selectedTags],
                createdAt: new Date()
            }
        );
    }

    document.getElementById("title").value = "";
    document.getElementById("url").value = "";
    document.getElementById("thumb").value = "";
    document.getElementById("endDate").value = "";

    document.getElementById("fileThumb").value = "";
    document.getElementById("fileNameText").textContent = "";

    selectedTags = [];

    document.querySelectorAll(".memberTag")
    .forEach(btn => {
        btn.classList.remove("active");
    });

    render();
}

async function render() {

    const list = document.getElementById("list");

    list.innerHTML = "";

    if (!currentPlaylist) {
        list.innerHTML = "";
        return;
    }

    const q = query(
        collection(window.db, "videos"),
        where("playlist", "==", currentPlaylist),
        orderBy("order")
    );

    const snap = await getDocs(q);

    const docs = snap.docs.sort((a, b) => {
        return (a.data().order ?? 0) - (b.data().order ?? 0);
    });

    docs.forEach(docSnap => {
        const v = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement("div");
        div.className = "video";
        div.dataset.id = id;

        const img = `
            <div class="thumbWrap" onclick="play('${id}')">
                ${
                    v.thumb
                    ? `<img class="thumb" src="${v.thumb}">`
                    : `<div class="thumb"></div>`
                }
                <div class="playIcon">▶</div>
            </div>
        `;

        const tagHTML = (v.tags || []).map(tag => {
            let className = "";

            if(tag === "那須") className = "nasu";
            if(tag === "浮所") className = "ukisho";
            if(tag === "作間") className = "sakuma";
            if(tag === "深田") className = "fukada";
            if(tag === "龍我") className = "ryuga";

            return `
                <div class="videoTag ${className}">
                    ${tag}
                </div>
            `;
        }).join("");

        div.innerHTML = `
            ${img}

            <div class="info">
                <b>${v.title}</b>
                <div class="tagList">
                    ${tagHTML}
                </div>
                <br>

                <div
                    style="
                        display:flex;
                        align-items:center;
                        gap:10px;
                        margin-top:4px;    
                    "
                >

                    ${
                        v.endDate
                        ? `<div class="endDateText">
                            配信終了日：${formatDateTime(v.endDate)}
                        </div>`
                        : `<div class="endDateText"></div>`
                    } 

                    <div class="VideoButtons">

                        <button 
                            onclick='editVideo(
                                "${id}",
                                ${JSON.stringify(v.title)},
                                ${JSON.stringify(v.url)},
                                ${JSON.stringify(v.thumb || "")},
                                ${JSON.stringify(v.endDate || "")},
                                ${v.autoDelete},
                                ${JSON.stringify(v.tags || [])}
                            )'
                        >
                            編集
                        </button>

                        <button 
                            class="deleteBtn"
                            onclick="removeVideoFirestore('${id}')"
                        >
                            削除
                        </button>
                    </div>
                </div>
            </div>
        `;

        list.appendChild(div);
    });
}

async function play(id) {

    const docRef = doc(window.db, "videos", id);
    const snap = await getDoc(docRef);

    if (!snap.exists()) {
        alert("動画が見つかりません");
        return;
    }

    const data = snap.data();

    if (data.url) {
        window.open(data.url, "_blank");
    }
}

function editVideo (id, title, url, thumb, endDate, autoDelete, tags) {

    editingIndex = id;

    document.getElementById("title").value = title;
    document.getElementById("url").value = url;
    document.getElementById("thumb").value = thumb || "";
    document.getElementById("endDate").value = endDate || "";
    document.getElementById("autoDelete").checked = autoDelete || false;

    document.querySelector(".addButton").textContent = "更新";

    document.getElementById("editArea")
        .scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
}

async function removeVideoFirestore(id) {

    const ok = confirm("削除しますか？");
    if (!ok) return;

    try {
        const docRef = doc(window.db, "videos", id);
        const snap = await getDoc(docRef);

        if (!snap.exists()) {
            alert("データが見つかりません");
            return;
        }

        const video = snap.data();

        let trash = JSON.parse(localStorage.getItem("trashVideos") || "{}");

        const key = currentPlaylist;

        if (!trash[key]) trash[key] = [];

        trash[key].push({
            id,
            video
        });

        localStorage.setItem("trashVideos", JSON.stringify(trash));

        await deleteDoc(docRef);

        render();

        showUndoToastFirestore(id, video);
    } catch (e) {
        console.error(e);
        alert("削除に失敗しました");
    }  
}

async function createPlaylist() {

    const name = prompt("プレイリスト名");

    if (
        !name ||
        !name.trim()
    ) {
        return;
    }

    const cleanName = name.trim();

    const q = query(
        collection(window.db, "playlists"),
        where("name", "==", cleanName)
    );

    const snap = await getDocs(q);

    if (!snap.empty) {
        alert("同じ名前があります");
            return;
    }    

    await addDoc(
        collection(window.db, "playlists"),
        {
            name: cleanName,
            createdAt: new Date()
        }
    );

    currentPlaylist = cleanName;

    localStorage.setItem("lastPlaylist", currentPlaylist);

    updatePlaylistSelect();
    render();
}

async function renamePlaylist() {

    if (!currentPlaylist) {

        const newName =prompt("新しいプレイリスト名");

        if (
            !newName ||
            !newName.trim()
        ) {
            return;
        }

        const cleanName = newName.trim();

        const checkQ = query(
            collection(window.db, "playlists"),
            where("name", "==", cleanName)
        );

        const checkSnap = await getDocs(checkQ);

        if (!checkSnap.empty && cleanName !== currentPlaylist) {
            alert("同じ名前があります");
            return;
        }

        await addDoc(
            collection(window.db, "playlists"),
            {
                name: cleanName,
                createdAt: new Date()
            }
        );

        currentPlaylist = cleanName;

        localStorage.setItem(
            "lastPlaylist",
            currentPlaylist
        );

        await updatePlaylistSelect();
        render();

        return;
    }

    const newName = prompt(
        "新しいプレイリスト名",
        currentPlaylist
    );

    if (
        !newName ||
        !newName.trim()
    ) {
        return;
    }

    const cleanName = newName.trim();

    const checkQ = query(
        collection(window.db, "playlists"),
        where("name", "==", cleanName)
    );

    const checkSnap = await getDocs(checkQ);

    if (!checkSnap.empty && cleanName !== currentPlaylist) {
        alert("同じ名前があります");
        return;
    }

    const q = query(
        collection(window.db, "playlists"),
        where("name", "==", currentPlaylist)
    );

    const snap = await getDocs(q);

    for (const docSnap of snap.docs) {
        await updateDoc(
            doc(window.db, "playlists", docSnap.id),
            {
                name: cleanName
            }
        );
    }

    const videosQ = query(
        collection(window.db, "videos"),
        where("playlist", "==", currentPlaylist)
    );

    const videosSnap = await getDocs(videosQ);

    for (const docSnap of videosSnap.docs) {
        await updateDoc(
            doc(window.db, "videos", docSnap.id),
            {
                playlist: cleanName
            }
        );
    }

    currentPlaylist = cleanName;

    localStorage.setItem("lastPlaylist", currentPlaylist);

    await updatePlaylistSelect();
    render();
}

async function deletePlaylist(name) {

    const ok = confirm(`「${name}」を削除しますか？`);
    if (!ok) return;

    const playlistQ = query(
        collection(window.db, "playlists"),
        where("name", "==", name)
    );

    const playlistSnap = await getDocs(playlistQ);

    let playlistData = null;

    playlistSnap.forEach(docSnap => {
        playlistData = docSnap.data();
    });

    const videosQ = query(
        collection(window.db, "videos"),
        where("playlist", "==", name)
    );

    const videosSnap = await getDocs(videosQ);

    let deletedVideos = [];

    videosSnap.forEach(docSnap => {
        deletedVideos.push(docSnap.data());
    });

    for (const docSnap of playlistSnap.docs) {
        await deleteDoc(
            doc(window.db, "playlists", docSnap.id)
        );
    }

    for (const docSnap of videosSnap.docs) {
        await deleteDoc(
            doc(window.db, "videos", docSnap.id)
        );
    }

    currentPlaylist = ""

    updatePlaylistSelect();
    render();

    showUndoToastPlaylist(
        name,
        playlistData,
        deletedVideos
    );
}

async function updatePlaylistSelect() {

    const select =
        document.getElementById("playlistSelect");

    select.innerHTML = "";

    const snap = await getDocs(
        collection(window.db, "playlists")
    );

    snap.forEach(docSnap => {
        const data = docSnap.data();

        if (
            !data.name ||
            data.name === "undefined"
        ) {
            return;
        }

        const option = document.createElement("option");
        option.value = data.name;
        option.textContent = data.name;

        select.appendChild(option);
    });

    if (!currentPlaylist) {
        const option = document.createElement("option");

        option.value = "";
        option.textContent = "新規プレイリスト";

        option.selected = true;
        select.appendChild(option);

        return;
    }

    const exists = [...select.options].some(
        option => option.value === currentPlaylist
    );

    if (!exists) {
        currentPlaylist = "";
        localStorage.removeItem("lastPlaylist");

        const option = document.createElement("option");

        option.value = "";
        option.textContent = "新規プレイリスト";

        option.selected = true;

        select.appendChild(option);

        return;
    }
    select.value = currentPlaylist;
}

function changePlaylist() {

    currentPlaylist =
        document.getElementById("playlistSelect").value;

    if (
        !currentPlaylist ||
        currentPlaylist === "undefined"
    ) {
        currentPlaylist = "";
        localStorage.removeItem("lastPlaylist");
        history.replaceState(null, "", "create.html");
        render();
        return;
    }
    
    localStorage.setItem("lastPlaylist", currentPlaylist);

    history.replaceState(null, "", `create.html?id=${encodeURIComponent(currentPlaylist)}`);

    render();
    loadAutoDeleteSetting();
}

function goHome() {

    location.href = "index.html";
}

async function removeExpiredVideos() {
    const now = new Date();

    const snap = await getDocs(
        collection(window.db, "videos")
    );

    for (const docSnap of snap.docs) {
        const video = docSnap.data();
        if (
            video.autoDelete &&
            video.endDate &&
            new Date(video.endDate) <= now
        ) {
            await deleteDoc(
                doc(window.db, "videos", docSnap.id)
            );
        }
    }
}

new Sortable(
    document.getElementById("list"),
    {
        animation: 150,
        delay: 200,
        delayOnTouchOnly: true,
        touchStartThreshold: 5,
        forceFallback: true,
        onEnd: async function () {

            const items = document.querySelectorAll(".video");

            for (let i = 0; i < items.length; i++) {
                const id = items[i].dataset.id;
                await updateDoc(
                    doc(window.db, "videos", id),
                    {
                        order: i
                    }
                );
            }

            render();
        }
    }
);

function showUndoToastFirestore(id, video) {

    const toast = document.createElement("div");
    toast.textContent = "動画を削除しました";

    const undo = document.createElement("button");
    undo.textContent = "元に戻す";

    undo.style.marginLeft = "10px";
    undo.style.background = "white";
    undo.style.color = "black";
    undo.style.border = "none";
    undo.style.borderRadius = "6px"
    undo.style.padding = "4px 8px"
    undo.style.cursor = "pointer";
    undo.style.display = "flex";
    undo.style.alignItems = "center";
    undo.style.justifyContent = "center";

    undo.onclick = async function () {

        try {
            await addDoc(collection(window.db, "videos"), {
                ...video,
                playlist: currentPlaylist,
                createdAt: new Date()
            });

            let trash = JSON.parse(localStorage.getItem("trashVideos") || "{}");

            if (trash[currentPlaylist]) {
                trash[currentPlaylist] = trash[currentPlaylist].filter(v => v.id !== id);
            }

            localStorage.setItem("trashVideos", JSON.stringify(trash));

            render();
            toast.remove();
        } catch (e) {
            console.error(e);
            alert("復元に失敗しました");
        }
    };

    toast.appendChild(undo);

    styleToast(toast);
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 5000);
}

function showUndoToastPlaylist(name, playlistData, deletedVideos) {

    const toast = document.createElement("div");
    toast.textContent = "プレイリストを削除しました";

    const undo = document.createElement("button");
    undo.textContent = "元に戻す";

    undo.style.marginLeft = "10px";
    undo.style.background = "white";
    undo.style.color = "black";
    undo.style.border = "none";
    undo.style.borderRadius = "6px";
    undo.style.padding = "4px 8px";
    undo.style.cursor = "pointer";

    undo.onclick = async function () {

        try {

            await addDoc(
                collection(window.db, "playlists"),
                {
                    name: name,
                    createdAt: new Date()
                }
            );

            for (const video of deletedVideos) {

                await addDoc(
                    collection(window.db, "videos"),
                    {
                        ...video,
                        playlist: name,
                        createdAt: new Date()
                    }
                );
            }

            currentPlaylist = name;

            localStorage.setItem(
                "lastPlaylist",
                currentPlaylist
            );

            await updatePlaylistSelect();
            await render();

            toast.remove();

        } catch (e) {

            console.error(e);

            alert("復元に失敗しました");
        }
    };

    toast.appendChild(undo);

    styleToast(toast);

    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 5000);
}

function styleToast(toast) {
    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.background = "black";
    toast.style.color = "white";
    toast.style.padding = "10px 15px";
    toast.style.borderRadius = "10px";
    toast.style.display = "flex";
    toast.style.alignItems = "center";
    toast.style.whiteSpace = "nowrap";
    toast.style.gap = "10px";
    toast.style.zIndex = "999999";
}

function fileToBase64(file) {
    return new Promise((resolve) => {

        const reader = new FileReader();

        reader.onload = function (e) {

            const img = new Image();

            img.onload = function () {

                const canvas =
                    document.createElement("canvas");

                const width = 160;

                const height =
                    img.height * (width / img.width);

                canvas.width = width;
                canvas.height = height;

                const ctx =
                    canvas.getContext("2d");

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                resolve(
                    canvas.toDataURL(
                        "image/jpeg",
                        0.5
                    )
                );
            };

            img.src = e.target.result;
        };

        reader.readAsDataURL(file);
    });
}

function loadAutoDeleteSetting() {

    const saved =
        localStorage.getItem(
            "autoDelete_" + currentPlaylist
        );

    const checkbox =
        document.getElementById("autoDelete");

    if (saved === null) {

        checkbox.checked = true;

    } else {

        checkbox.checked = saved === "true";
    }
}

function saveAutoDeleteSetting() {

    const checked =
        document.getElementById("autoDelete").checked;

    localStorage.setItem(
        "autoDelete_" + currentPlaylist,
        checked
    );
}

function showFileName() {

    const input =
        document.getElementById("fileThumb");

    const text =
        document.getElementById("fileNameText");

    if (
        input.files &&
        input.files[0]
    ) {

        text.textContent =
            input.files[0].name;

    } else {

        text.textContent = "";
    }
}

function copyShareUrl() {
    if (!currentPlaylist) {
        alert("プレイリストを選択してください");
        return;
    }

    const shareUrl =
        `${location.origin}/share.html?id=${encodeURIComponent(currentPlaylist)}`;
    navigator.clipboard.writeText(shareUrl);
    alert("共有URLをコピーしました");
}

<script>

let currentPlaylist = "";

let dragIndex = 0;

let editingIndex = null;

let selectedTags = [];

let undoStack = null;

let undoStackPlaylist = null;

document.querySelectorAll(".memberTag").forEach(btn => {
    btn.onclick = () => {
        const tag = btn.dataset.tag;
        if(selectedTags.includes(tag)){
            selectedTags =
                selectedTags.filter(t => t !== tag);
            btn.classList.remove("active");
        }else{
            selectedTags.push(tag);
            btn.classList.add("active");
        }
    };
});

function setCurrentPlaylist(name) {
    if (!name) {
        currentPlaylist = "";
    } else {
        currentPlaylist = name;
    }
    localStorage.setItem("lastPlaylist", currentPlaylist);
}

function getPlaylistFromURL() {

    const params =
        new URLSearchParams(location.search);

    const isNew = params.get("new") === "1";
    const urlPlaylist = params.get("id");
    const lastPlaylist = localStorage.getItem("lastPlaylist");

    if (isNew) {
        history.replaceState(null, "", "create.html");
    }

    if (isNew) {
        currentPlaylist = "";
    } else if (urlPlaylist) {
        currentPlaylist = urlPlaylist;
    } else if (lastPlaylist) {
        currentPlaylist = lastPlaylist;
    } else {
        currentPlaylist = "";
    }

    const isFromURL = !!urlPlaylist;

    if (!isNew && !isFromURL) {
        localStorage.setItem("lastPlaylist", currentPlaylist);
    }

    localStorage.setItem("lastPlaylist", currentPlaylist);

    return currentPlaylist;
}

window.onload = async function () {

    const urlPlaylist = getPlaylistFromURL();

    // URL or 保存済み or 空でもOK（ここでは作らない）
    if (!currentPlaylist || currentPlaylist === "undefined") {
        currentPlaylist = "";
    }

    await updatePlaylistSelect();
    await removeExpiredVideos();
    await render();
    loadAutoDeleteSetting();
};

function formatDateTime(date) {

    if (!date) return "";

    const d = new Date(date);

    return d.toLocaleString(
        "ja-JP",
        {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        }
    );
}

function getRemainingTime(date) {

    if (!date) return "";

    const now = new Date();

    const end = new Date(date);

    const diff = end - now;

    if (diff <= 0) {
        return "配信終了";
    }

    const minutes =
        Math.floor(
            diff / (1000 * 60)
        );

    const hours =
        Math.floor(
            diff / (1000 * 60 * 60)
        );

    const days =
        Math.floor(hours / 24);

    if (days > 0) {
        return `${days}日`;
    }

    if (hours >= 1) {
        return `${hours}時間`;
    }

    return `${minutes}分`;
}

async function addVideo () {

    const title = document.getElementById("title").value;
    const url = document.getElementById("url").value;
    const endDate = document.getElementById("endDate").value;

    const fileInput = document.getElementById("fileThumb");
    let thumb = document.getElementById("thumb").value;
    const autoDelete = document.getElementById("autoDelete").checked;

    if (!title || !url) return;

    // ★ここで初めてプレイリスト作る（重要）
    if (!currentPlaylist) {

        const docRef = await addDoc(
            collection(window.db, "playlists"),
            {
                name: "新規プレイリスト",
                createdAt: new Date(),
                isTemp: true
            }
        );

        currentPlaylist = docRef.id;

        localStorage.setItem("lastPlaylist", currentPlaylist);

        history.replaceState(
            null,
            "",
            `create.html?id=${currentPlaylist}`
        );
    }

    if (fileInput.files && fileInput.files[0]) {
        thumb = await fileToBase64(fileInput.files[0]);
    }

    const q = query(
        collection(window.db, "videos"),
        where("playlistId", "==", currentPlaylist),
        orderBy("order")
    );

    const snap = await getDocs(q);
    const order = snap.size;

    await addDoc(
        collection(window.db, "videos"),
        {
            playlistId: currentPlaylist,
            title,
            url,
            thumb,
            endDate,
            autoDelete,
            order,
            tags: [...selectedTags],
            createdAt: new Date()
        }
    );

    // reset
    document.getElementById("title").value = "";
    document.getElementById("url").value = "";
    document.getElementById("thumb").value = "";
    document.getElementById("endDate").value = "";

    document.getElementById("fileThumb").value = "";
    document.getElementById("fileNameText").textContent = "";

    selectedTags = [];

    document.querySelectorAll(".memberTag")
        .forEach(btn => btn.classList.remove("active"));

    await render();
}

async function render() {
    console.log("currentPlaylist=", currentPlaylist);

    const list = document.getElementById("list");

    list.innerHTML = "";

    if (!currentPlaylist) {
        list.innerHTML = "";
        return;
    }

    const q = query(
        collection(window.db, "videos"),
        where("playlistId", "==", currentPlaylist),
        orderBy("order")
    );

    const snap = await getDocs(q);
    console.log("動画件数=", snap.size);

    const docs = snap.docs.sort((a, b) => {
        return (a.data().order ?? 0) - (b.data().order ?? 0);
    });

    docs.forEach(docSnap => {
        const v = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement("div");
        div.className = "video";
        div.dataset.id = id;

        const img = `
            <a 
                class="thumbWrap"
                href="${v.url}"
                target="_blank"
            >
                ${
                    v.thumb
                    ? `<img class="thumb" src="${v.thumb}">`
                    : `<div class="thumb"></div>`
                }
                <div class="playIcon">▶</div>
            </a>
        `;

        const tagHTML = (v.tags || []).map(tag => {
            let className = "";

            if(tag === "那須") className = "nasu";
            if(tag === "浮所") className = "ukisho";
            if(tag === "作間") className = "sakuma";
            if(tag === "深田") className = "fukada";
            if(tag === "龍我") className = "ryuga";

            return `
                <div class="videoTag ${className}">
                    ${tag}
                </div>
            `;
        }).join("");

        div.innerHTML = `
            ${img}

            <div class="info">
                <b>${v.title}</b>
                <div class="tagList">
                    ${tagHTML}
                </div>

                <div
                    style="
                        display:flex;
                        align-items:center;
                        gap:10px;
                        margin-top:4px;    
                    "
                >

                    ${
                        v.endDate
                        ? `<div class="endDateText">
                            配信終了日：${formatDateTime(v.endDate)}
                        </div>`
                        : `<div class="endDateText"></div>`
                    } 

                    <div class="VideoButtons">

                        <button 
                            onclick='editVideo(
                                "${id}",
                                ${JSON.stringify(v.title)},
                                ${JSON.stringify(v.url)},
                                ${JSON.stringify(v.thumb || "")},
                                ${JSON.stringify(v.endDate || "")},
                                ${v.autoDelete},
                                ${JSON.stringify(v.tags || [])}
                            )'
                        >
                            編集
                        </button>

                        <button 
                            class="deleteBtn"
                            onclick="removeVideoFirestore('${id}')"
                        >
                            削除
                        </button>
                    </div>
                </div>
            </div>
        `;

        list.appendChild(div);
    });
}

async function play(id) {

    const docRef = doc(window.db, "videos", id);
    const snap = await getDoc(docRef);

    if (!snap.exists()) {
        alert("動画が見つかりません");
        return;
    }

    const data = snap.data();

    if (data.url) {
        window.open(data.url, "_blank");
    }
}

function editVideo (id, title, url, thumb, endDate, autoDelete, tags) {

    editingIndex = id;

    document.getElementById("title").value = title;
    document.getElementById("url").value = url;
    document.getElementById("thumb").value = thumb || "";
    document.getElementById("endDate").value = endDate || "";
    document.getElementById("autoDelete").checked = autoDelete || false;

    selectedTags = tags || [];

    document.querySelectorAll(".memberTag").forEach(btn => {
        const tag = btn.dataset.tag;
        btn.classList.toggle("active", selectedTags.includes(tag));
    });

    document.querySelector(".addButton").textContent = "更新";

    document.getElementById("editArea")
        .scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
}

async function removeVideoFirestore(id) {

    const ok = confirm("削除しますか？");
    if (!ok) return;

    const docRef = doc(window.db, "videos", id);
    const snap = await getDoc(docRef);

    if (!snap.exists()) return;

    const data = snap.data();

    // ★完全保存（ID込み）
    undoStack = {
        id,
        data: JSON.parse(JSON.stringify(data))
    };

    await deleteDoc(docRef);
    await render();

    showUndoToastFirestore();
}

    const cleanName = name.trim();

    const q = query(
        collection(window.db, "playlists"),
        where("name", "==", cleanName)
    );

    const snap = await getDocs(q);

    if (!snap.empty) {
        alert("同じ名前があります");
            return;
    }    

    const docRef = await addDoc(
        collection(window.db, "playlists"),
        {
            name: cleanName,
            createdAt: new Date()
        }
    );

    currentPlaylist = docRef.id;
    localStorage.setItem("lastPlaylist", currentPlaylist);

    history.replaceState(
        null,
        "",
        `create.html?id=${encodeURIComponent(currentPlaylist)}`
    );

    await updatePlaylistSelect();
    document.getElementById("playlistSelect").value = currentPlaylist;

    await render();
}

async function deletePlaylist(name) {

    const playlistName =
        document.getElementById("playlistSelect")
        .selectedOptions[0]
        ?.textContent || "";

    const ok = confirm(`「${playlistName}」を削除しますか？`);
    if (!ok) return;

    const playlistRef = doc(window.db, "playlists", name);
    const playlistSnap = await getDoc(playlistRef);

    if (!playlistSnap.exists()) return;

    const playlistData = playlistSnap.data();

    const videosQ = query(
        collection(window.db, "videos"),
        where("playlistId", "==", name)
    );

    const videosSnap = await getDocs(videosQ);

    const deletedVideos = [];
    videosSnap.forEach(docSnap => {
        deletedVideos.push({
            id: docSnap.id,
            data: docSnap.data()
        });
    });

    // ★UNDO用に保存
    undoStackPlaylist = {
        id: name,
        playlist: playlistData,
        videos: deletedVideos
    };

    // 削除
    await deleteDoc(playlistRef);

    for (const v of videosSnap.docs) {
        await deleteDoc(doc(window.db, "videos", v.id));
    }

    currentPlaylist = "";

    await updatePlaylistSelect();
    render();

    showUndoToastPlaylist();
}

function showUndoToastPlaylist() {

    const toast = document.createElement("div");

    const text = document.createElement("div");
    text.className = "toastText";
    text.innerHTML = "プレイリストを削除しました";

    const undo = document.createElement("button");
    undo.textContent = "元に戻す";

    let used = false;

    undo.onclick = async function () {
        if (used) return;
        used = true;

        if (!undoStackPlaylist) return;

        const { id, playlist, videos } = undoStackPlaylist;

        await setDoc(doc(window.db, "playlists", id), playlist);

        for (const v of videos) {
            await setDoc(doc(window.db, "videos", v.id), v.data);
        }

        undoStackPlaylist = null;

        currentPlaylist = id;
        localStorage.setItem("lastPlaylist", id);

        await updatePlaylistSelect();
        await render();

        toast.remove();
    };

    toast.appendChild(text);
    toast.appendChild(undo);

    styleUndoToast(toast, "playlist");
    document.body.appendChild(toast);

    setTimeout(() => {
        undoStackPlaylist = null;
        toast.remove();
    }, 5000);
}

function styleUndoToast(toast, type = "video") {

    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";

    toast.style.background = "#fff";
    toast.style.color = "#111";
    toast.style.padding = "12px 14px";
    toast.style.borderRadius = "12px";
    toast.style.display = "flex";
    toast.style.alignItems = "center";
    toast.style.justifyContent = "space-between";
    toast.style.minWidth = "280px";
    toast.style.maxWidth = "90vw";
    toast.style.boxShadow = "0 10px 25px rgba(0,0,0,0.15)";
    toast.style.zIndex = "999999";
    toast.style.gap = "12px";

    const textColor = toast.querySelector(".toastText");
    if (textColor) {
        textColor.style.fontSize = "14px";
    }

    const btn = toast.querySelector("button");
    if (btn) {
        btn.style.padding = "6px 12px";
        btn.style.borderRadius = "8px";
        btn.style.border = "none";
        btn.style.cursor = "pointer";
        btn.style.fontWeight = "bold";

        if (type === "playlist") {
            btn.style.background = "#22c55e"; // 緑
            btn.style.color = "white";
        } else {
            btn.style.background = "#3b82f6"; // 青
            btn.style.color = "white";
        }
    }
}

async function updatePlaylistSelect() {

    const select =
        document.getElementById("playlistSelect");

    select.innerHTML = "";

    const snap = await getDocs(
        collection(window.db, "playlists")
    );

    snap.forEach(docSnap => {
        const data = docSnap.data();

        if (
            !data.name ||
            data.name === "undefined"
        ) {
            return;
        }

        const option = document.createElement("option");
        option.value = docSnap.id;
        option.textContent = data.name;

        select.appendChild(option);
    });

    if (!currentPlaylist) {
        const option = document.createElement("option");

        option.value = "";
        option.textContent = "新規プレイリスト";

        option.selected = true;
        select.appendChild(option);

        return;
    }

    const exists = [...select.options].some(
        option => option.value === currentPlaylist
    );

    if (!exists) {
        currentPlaylist = "";
        localStorage.removeItem("lastPlaylist");

        const option = document.createElement("option");

        option.value = "";
        option.textContent = "新規プレイリスト";

        option.selected = true;

        select.appendChild(option);

        return;
    }
    select.value = currentPlaylist;
}

function changePlaylist() {

    currentPlaylist =
        document.getElementById("playlistSelect").value;

    if (
        !currentPlaylist ||
        currentPlaylist === "undefined"
    ) {
        currentPlaylist = "";
        localStorage.removeItem("lastPlaylist");
        history.replaceState(null, "", "create.html");
        render();
        return;
    }
    
    localStorage.setItem("lastPlaylist", currentPlaylist);

    history.replaceState(null, "", `create.html?id=${encodeURIComponent(currentPlaylist)}`);

    render();
    loadAutoDeleteSetting();
}

function goHome() {

    location.href = "index.html";
}

async function removeExpiredVideos() {
    const now = new Date();

    const snap = await getDocs(
        collection(window.db, "videos")
    );

    for (const docSnap of snap.docs) {
        const video = docSnap.data();
        if (
            video.autoDelete &&
            video.endDate &&
            new Date(video.endDate) <= now
        ) {
            await deleteDoc(
                doc(window.db, "videos", docSnap.id)
            );
        }
    }
}

new Sortable(
    document.getElementById("list"),
    {
        animation: 150,
        delay: 200,
        delayOnTouchOnly: true,
        touchStartThreshold: 5,
        forceFallback: true,
        onEnd: async function () {

            const items = document.querySelectorAll(".video");

            for (let i = 0; i < items.length; i++) {
                const id = items[i].dataset.id;
                await updateDoc(
                    doc(window.db, "videos", id),
                    {
                        order: i
                    }
                );
            }

            render();
        }
    }
);

function showUndoToastFirestore() {

    const toast = document.createElement("div");

    const text = document.createElement("div");
    text.className = "toastText";
    text.innerHTML = "動画を削除しました";

    const undo = document.createElement("button");
    undo.textContent = "元に戻す";

    let used = false;

    undo.onclick = async function () {
        if (used) return;
        used = true;

        if (!undoStack) return;

        const { id, data } = undoStack;

        await setDoc(doc(window.db, "videos", id), data);

        undoStack = null;

        await render();
        toast.remove();
    };

    toast.appendChild(text);
    toast.appendChild(undo);

    styleUndoToast(toast, "video");
    document.body.appendChild(toast);

    setTimeout(() => {
        undoStack = null;
        toast.remove();
    }, 5000);
}

function styleToast(toast) {
    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.background = "black";
    toast.style.color = "white";
    toast.style.padding = "10px 15px";
    toast.style.borderRadius = "10px";
    toast.style.display = "flex";
    toast.style.alignItems = "center";
    toast.style.whiteSpace = "nowrap";
    toast.style.gap = "10px";
    toast.style.zIndex = "999999";
}

function fileToBase64(file) {
    return new Promise((resolve) => {

        const reader = new FileReader();

        reader.onload = function (e) {

            const img = new Image();

            img.onload = function () {

                const canvas =
                    document.createElement("canvas");

                const width = 160;

                const height =
                    img.height * (width / img.width);

                canvas.width = width;
                canvas.height = height;

                const ctx =
                    canvas.getContext("2d");

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                resolve(
                    canvas.toDataURL(
                        "image/jpeg",
                        0.5
                    )
                );
            };

            img.src = e.target.result;
        };

        reader.readAsDataURL(file);
    });
}

function loadAutoDeleteSetting() {

    const saved =
        localStorage.getItem(
            "autoDelete_" + currentPlaylist
        );

    const checkbox =
        document.getElementById("autoDelete");

    if (saved === null) {

        checkbox.checked = true;

    } else {

        checkbox.checked = saved === "true";
    }
}

function saveAutoDeleteSetting() {

    const checked =
        document.getElementById("autoDelete").checked;

    localStorage.setItem(
        "autoDelete_" + currentPlaylist,
        checked
    );
}

function showFileName() {

    const input =
        document.getElementById("fileThumb");

    const text =
        document.getElementById("fileNameText");

    if (
        input.files &&
        input.files[0]
    ) {

        text.textContent =
            input.files[0].name;

    } else {

        text.textContent = "";
    }
}

function copyShareUrl() {
    if (!currentPlaylist) {
        alert("プレイリストを選択してください");
        return;
    }

    const shareUrl =
        `${location.origin}/share.html?id=${encodeURIComponent(currentPlaylist)}`;
    navigator.clipboard.writeText(shareUrl);
    alert("共有URLをコピーしました");
}

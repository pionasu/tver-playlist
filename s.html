<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect...</title>
</head>
<body>

読込中...

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjIPTR43eqc9TaG9S9a13M8Nj7RcomuPk",
  authDomain: "tver-playlist.firebaseapp.com",
  projectId: "tver-playlist",
  storageBucket: "tver-playlist.firebasestorage.app",
  messagingSenderId: "474578557521",
  appId: "1:474578557521:web:1e152de7d7edc9553ef670",
  measurementId: "G-FKV7QE7KG7"
};

try {

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const shortId =
    location.pathname.split("/").pop();

  const snap = await getDoc(
    doc(db, "shortUrls", shortId)
  );

  if (!snap.exists()) {

    document.body.innerHTML =
      `shortUrls/${shortId} が見つかりません`;

  } else {

    const playlistId =
      snap.data().playlistId;

    location.replace(
      `/share.html?id=${playlistId}`
    );

  }

} catch (e) {

  console.error(e);

  document.body.innerHTML =
    `<pre>${e.message}</pre>`;

}

</script>

</body>
</html>

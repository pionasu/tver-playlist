<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>プレイリスト</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:25px;
}

.backBtn{
    border:none;
    background:none;
    font-size:28px;
    cursor:pointer;
    padding:0;
}

.playlistTitle{
    font-size:22px;
    font-weight:bold;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.video{
    display:flex;
    gap:12px;
    align-items: center;

    background:white;

    padding:10px;
    margin-bottom:12px;

    border-radius:14px;

    cursor:pointer;

    transition:0.2s;
}

.video:active{
    transform:scale(0.98);
}

.thumb{
    width:140px;
    height:78px;

    object-fit:cover;

    border-radius:10px;

    background:#ddd;

    flex-shrink:0;
}

.info{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
}

.videoTitle{
    font-size:16px;
    font-weight:bold;

    line-height:1.4;

    display:-webkit-box;
    line-clamp: 2;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;

    overflow:hidden;
}

.expire{
    margin-top:8px;

    font-size:13px;
    color:#ff4d4d;
}

.empty{
    text-align:center;
    color:#777;
    margin-top:80px;
    font-size:15px;
}

.thumbWrap{
    position:relative;

    width:140px;
    height:78px;

    flex-shrink:0;
}

.playIcon{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    width: 38px;
    height: 38px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size:18px;

    color:white;

    background:rgba(0,0,0,0.5);

    border-radius:50%;

    pointer-events:none;
}

.tagList{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:6px;
}

.videoTag{
    display:inline-block;

    width:fit-content;

    white-space:nowrap;

    font-size:10px;

    padding:2px 6px;

    border-radius:999px;

    color:white;

    font-weight:bold;
}

.videoTag.nasu{
    background:#4DA3FF;
}

.videoTag.ukisho{
    background:#FF9F43;
}

.videoTag.sakuma{
    background:#A66CFF;
}

.videoTag.fukada{
    background:#4CAF50;
}

.videoTag.ryuga{
    background:#FFD600;
}

.filterArea{
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
}

.filterBtn{
    border: none;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    color: white;
}

.filterBtn.active{
    outline: 2px solid black;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <button
            class="backBtn"
            onclick="location.href='my.html'"
        >
            ←
        </button>

        <div
            id="playlistTitle"
            class="playlistTitle"
        >
        </div>

    </div>

    <div class="filterArea">

        <button class="filterBtn nasu" data-tag="那須">
            那須雄登
        </button>

        <button class="filterBtn ukisho" data-tag="浮所">
            浮所飛貴
        </button>

        <button class="filterBtn sakuma" data-tag="作間">
            作間龍斗
        </button>

        <button class="filterBtn fukada" data-tag="深田">
            深田竜生
        </button>

        <button class="filterBtn ryuga" data-tag="龍我">
            佐藤龍我
        </button>

    </div>

    <div id="videoList"></div>

    <div
        id="empty"
        class="empty"
        style="display:none;"
    >
        動画がありません
    </div>

</div>

<script>

const params =
    new URLSearchParams(location.search);

const playlistName =
    params.get("id");

document.getElementById("playlistTitle")
    .textContent =
    playlistName || "プレイリスト";

const videoList =
    document.getElementById("videoList");

const empty =
    document.getElementById("empty");

let activeFilter = null
let allVideos = [];

window.onload = async function () {

    while (!window.db) {
        await new Promise(r => setTimeout(r, 100));
    }

    const q = query(
        collection(window.db, "videos"),
        where("playlist", "==", playlistName),
        orderBy("order")
    );

    const snap = await getDocs(q);

    const videos = [];

    for (const docSnap of snap.docs) {
        const video = docSnap.data();

        if (
            video.autoDelete &&
            video.endDate &&
            new Date(video.endDate) <= new Date()
        ) {
            await deleteDoc(
                doc(window.db, "videos", docSnap.id)
            );
            continue;
        }
        videos.push(video);
    }
    allVideos = videos;
    render(allVideos);
    setupFilters();
};

function render(videos){

    videoList.innerHTML = "";

    if(videos.length === 0){

        empty.style.display = "block";
        return;
    }

    empty.style.display = "none";

    videos.forEach(video => {

        const div =
            document.createElement("div");

        div.className = "video";

        div.onclick = function(){

            if(video.url){

                window.open(
                    video.url,
                    "_blank"
                );
            }
        };

        const tagHTML = (video.tags || []).map(tag => {
            let className = "";

            if(tag === "那須") className = "nasu";
            if(tag === "浮所") className = "ukisho";
            if(tag === "作間") className = "sakuma";
            if(tag === "深田") className = "fukada";
            if(tag === "龍我") className = "ryuga";

            return `
                <div class="videoTag ${className}">
                    ${tag}
                </div>
            `;
        }).join("");

        div.innerHTML = `

            <div class="thumbWrap">

                <img
                    src="${video.thumb || ''}"
                    class="thumb"
                >

                <div class="playIcon">
                    ▶
                </div>
            </div>

            <div class="info">

                <div class="videoTitle">
                    ${video.title || "タイトルなし"}
                </div>

                <div class="tagList">
                    ${tagHTML}
                </div>

                <div class="expire">
                    ${
                        video.endDate
                        ? `配信終了まで ${getRemainingTime(video.endDate)}`
                        : ""
                    }
                </div>

            </div>

        `;

        videoList.appendChild(div);

    });
}

function getRemainingTime(date) {

    if (!date) return "";

    const now = new Date();

    const end = new Date(date);

    const diff = end - now;

    if (diff <= 0) {
        return "配信終了";
    }

    const minutes =
        Math.floor(
            diff / (1000 * 60)
        );

    const hours =
        Math.floor(
            diff / (1000 * 60 * 60)
        );

    const days =
        Math.floor(hours / 24);

    if (days > 0) {
        return `あと${days}日`;
    }

    if (hours >= 1) {
        return `あと${hours}時間`;
    }

    return `あと${minutes}分`;
}

function setupFilters(){

    document.querySelectorAll(".filterBtn")
    .forEach(btn => {

        btn.onclick = function(){

            const tag = btn.dataset.tag;

            if(activeFilter === tag){

                activeFilter = null;

                document
                    .querySelectorAll(".filterBtn")
                    .forEach(b => b.classList.remove("active"));

                render(allVideos);

                return;
            }

            activeFilter = tag;

            document
                .querySelectorAll(".filterBtn")
                .forEach(b => b.classList.remove("active"));

            btn.classList.add("active");

            const filtered =
                allVideos.filter(video =>
                    (video.tags || []).includes(tag)
                );

            render(filtered);
        };
    });
}

</script>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

  import { getFirestore, 
           collection, 
           getDocs, 
           query, 
           where,
           orderBy,
           deleteDoc,
           doc
         } 
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional

  window.where = where;

  window.deleteDoc = deleteDoc;
  window.doc = doc;
</script>

</body>
</html>

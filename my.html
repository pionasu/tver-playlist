<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <title>作成済みプレイリスト</title>

    <style>

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px 20px;
        }

        .video {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .thumb {
            width: 120px;
            height: 70px;
            border-radius: 6px;
            object-fit: cover;
            background: #ddd;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: black;
            color: white;
            cursor: pointer;
            margin: 3px;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 50px;
        }

        .btns {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }

        .btns button {
            white-space: nowrap;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            white-space: nowrap;
            font-size: 28px;
            line-height: 1;
        }

        .homeBtn {
            background: none;
            border: none;
            font-size: 28px;
            padding: 0;
            margin: 0;
            line-height: 1;
            cursor: pointer;
        }

        .deleteBtn {
            background: #ff4d4d;
            color: white;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">

        <button
            class="homeBtn"
            onclick="location.href='index.html'"
        >
            🏠
        </button>

        <h1 id="title">作成済みプレイリスト</h1>
    </div>

    <div id="list"></div>

        <div
            id="empty"
            class="empty"
            style="display: none;"
        >
            プレイリストがありません
        </div>
    </div>
</div>

<script>

let playlists = {};
let playlistOrder = [];

window.onload = function () {

    const saved = localStorage.getItem("tverPlaylists");
    
    if (saved) {
        playlists = JSON.parse(saved);
    }

    const savedOrder =
        localStorage.getItem("playlistOrder");

    if (savedOrder) {
        playlistOrder =
            JSON.parse(savedOrder);
    }

    render();
};

function render() {

    const list = document.getElementById("list");
    const empty = document.getElementById("empty");

    list.innerHTML = "";

    if (!playlistOrder.length) {
        playlistOrder = Object.keys(playlists);
    }

    const names = playlistOrder.filter(
        name => playlists[name]
    );

    if (names.length === 0) {
        empty.style.display = "block";
        return;
    }

    empty.style.display = "none";

    names.forEach(name => {

        const firstVideo = playlists[name][0];

        const thumb = firstVideo?.thumb
            ? `
                <img
                    src="${firstVideo.thumb}"
                    class="thumb"
                >
            `
            : "";

        const div = document.createElement("div");
        div.className = "video";
        div.dataset.name = name;

        div.onclick = function () {
            location.href = `view.html?id=${encodeURIComponent(name)}`;
        };
 
        div.innerHTML = `
            ${thumb}

            <div style="flex:1">
                <div
                    style="
                        font-size:18px;
                        font-weight:bold;

                        overflow:hidden;
                        text-overflow:ellipsis;
                        white-space:nowrap;

                        display:inline-block;
                        max-width:180px;
                        vertical-align:bottom;
                    "
                >
                    ${name}
                </div>

                <div
                    style="
                        display:flex;
                        align-items:center;
                        gap:10px;
                        margin-top:4px;
                    "
                >
                    <div
                        style="
                            font-size:13px;
                            color:#888;
                        "
                    >
                        ${playlists[name].length}件
                    </div>

                    <div class="btns">
                        <button class="shareBtn">共有</button>
                        <button class="editBtn">編集</button>
                        <button class="deleteBtn">削除</button>
                    </div>
                </div>
            </div>
        `;

        const shareBtn =
            div.querySelector(".shareBtn");

        shareBtn.onclick = function (event) {
            event.stopPropagation();
            copyViewURL(name);
        };

        const editBtn =
            div.querySelector(".editBtn");

        editBtn.onclick = function (event) {
            event.stopPropagation();
            location.href=
                `create.html?id=${encodeURIComponent(name)}`;
        };

        const deleteBtn = div.querySelector(".deleteBtn");

        deleteBtn.onclick = function (event) {
            event.stopPropagation();

            deletePlaylist(name);
        };

        list.appendChild(div);
    });

    new Sortable(list, {
        animation: 150,
        onEnd: function () {
            const newOrder = [];
            document.querySelectorAll(".video")
                .forEach(item => {
                    newOrder.push(
                        item.dataset.name
                    );
                });
            playlistOrder = newOrder;

            localStorage.setItem(
                "playlistOrder",
                JSON.stringify(playlistOrder)
            );
        }
    });
}

function copyViewURL(name){
    
    const url =
        location.origin +
        "/view.html?id=" +
        encodeURIComponent(name);
    navigator.clipboard.writeText(url);
    alert("共有URLコピー完了");
}

function deletePlaylist(name) {
    const ok = confirm(`「${name}」を削除しますか？`);
    if (!ok) return;

    let trash = JSON.parse(localStorage.getItem("trashPlaylists") || "{}");

    trash[name] = playlists[name];
    localStorage.setItem("trashPlaylists", JSON.stringify(trash));

    delete playlists[name];

    if (localStorage.getItem("lastPlaylist") === name) {
        localStorage.removeItem("lastPlaylist");
    }

    localStorage.setItem("tverPlaylists", JSON.stringify(playlists));

    showUndoToast(name);

    render();
}

function showUndoToast(name) {

    const toast = document.createElement("div");

    toast.textContent = `「${name}」を削除しました`;

    const undo = document.createElement("button");
    undo.textContent = "元に戻す";

    undo.style.marginLeft = "10px";
    undo.style.background = "white";
    undo.style.color = "black";
    undo.style.border = "none";
    undo.style.borderRadius = "6px"
    undo.style.padding = "4px 8px"
    undo.style.cursor = "pointer";
    undo.style.display = "flex";
    undo.style.alignItems = "center";
    undo.style.justifyContent = "center";

    undo.onclick = function () {

        let trash =
            JSON.parse(localStorage.getItem("trashPlaylists") || "{}");

        playlists[name] = trash[name];
        delete trash[name];

        localStorage.setItem("trashPlaylists", JSON.stringify(trash));
        localStorage.setItem("tverPlaylists", JSON.stringify(playlists));

        render();

        toast.remove();
    };

    toast.appendChild(undo);

    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.background = "black";
    toast.style.color = "white";
    toast.style.padding = "10px 15px";
    toast.style.borderRadius = "10px";
    toast.style.display = "flex";
    toast.style.alignItems = "center";
    toast.style.whiteSpace = "nowrap";
    toast.style.gap = "10px";
    toast.style.zIndex = "999999";

    document.body.appendChild(toast);

    console.log("toast出した");

    setTimeout(() => {
        toast.remove();
    }, 5000);
}

</script>

</body>
</html>
